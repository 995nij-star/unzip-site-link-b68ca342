name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  destructive-sql-guard:
    name: Destructive SQL Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run destructive SQL check
        run: node scripts/check-destructive-sql.mjs

  build-and-test:
    name: Build & Test
    needs: destructive-sql-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run destructive SQL check
        run: npm run check:sql

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
